<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root { --s: 1; --cat: transparent; }
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    -webkit-user-select: none; user-select: none; cursor: default; }
  .bar { -webkit-app-region: drag; display: flex; align-items: center; gap: calc(8px * var(--s));
    height: 100%; box-sizing: border-box; padding: 0 calc(10px * var(--s));
    background: rgba(31, 42, 44, .96); color: #EBE8E0;
    border: 1px solid rgba(235, 232, 224, .14);
    border-left: calc(4px * var(--s)) solid var(--cat);
    border-radius: calc(12px * var(--s)); }
  .dot { width: calc(9px * var(--s)); height: calc(9px * var(--s)); border-radius: 50%; background: #E5484D; flex: none;
    box-shadow: 0 0 6px #E5484D; animation: pulse 1.6s ease-in-out infinite; }
  .dot.paused { background: #8A8378; box-shadow: none; animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .3 } }
  .lbl { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: calc(12.5px * var(--s)); }
  .t { font-variant-numeric: tabular-nums; font-size: calc(12.5px * var(--s)); opacity: .85; flex: none; }
  .tot { font-variant-numeric: tabular-nums; font-size: calc(11px * var(--s)); opacity: .55; flex: none; }
  .btn { -webkit-app-region: no-drag; flex: none; border: 0; background: transparent; color: #EBE8E0;
    opacity: .55; cursor: pointer; font-size: calc(13px * var(--s)); line-height: 1; padding: 3px 4px; border-radius: 6px; }
  .btn:hover { opacity: 1; background: rgba(235, 232, 224, .12); }
  /* compact: dot + timer + open button only */
  .bar.compact .lbl, .bar.compact .tot, .bar.compact #pause { display: none; }
  /* on hover the window widens (main process) and we reveal the full label */
  .bar.expanded .lbl { white-space: normal; overflow: visible; }
  .bar.compact.expanded .lbl, .bar.compact.expanded .tot { display: block; }
</style>
</head>
<body>
  <div class="bar" id="bar">
    <span class="dot" id="dot"></span>
    <span class="lbl" id="lbl">Starting…</span>
    <span class="t" id="t"></span>
    <span class="tot" id="tot"></span>
    <button class="btn" id="pause" title="Pause / resume capturing">⏸</button>
    <button class="btn" id="open" title="Open OODA">▢</button>
  </div>
  <script>
    let start = Date.now(), paused = false;
    const bar = document.getElementById('bar'), dot = document.getElementById('dot'),
          lbl = document.getElementById('lbl'), tEl = document.getElementById('t'),
          tot = document.getElementById('tot'), pauseBtn = document.getElementById('pause');
    function fmt(ms) { const s = Math.floor(ms / 1000), h = Math.floor(s / 3600),
      m = Math.floor(s % 3600 / 60), ss = s % 60;
      return (h > 0 ? h + ':' + String(m).padStart(2, '0') : '' + m) + ':' + String(ss).padStart(2, '0'); }
    function fmtTot(ms) { const m = Math.round(ms / 60000);
      return m < 60 ? m + 'm' : (m / 60).toFixed(m % 60 ? 1 : 0).replace(/\.0$/, '') + 'h'; }
    function tick() { if (paused) { tEl.textContent = ''; return; } tEl.textContent = fmt(Date.now() - start); }
    setInterval(tick, 1000);
    window.hud.onUpdate(d => {
      document.documentElement.style.setProperty('--s', d.scale || 1);
      document.documentElement.style.setProperty('--cat', (d.showCategory && d.color) ? d.color : 'transparent');
      // category theme: tint the whole pill by the current category color
      bar.style.background = (d.theme === 'category' && d.color)
        ? 'color-mix(in srgb, ' + d.color + ' 26%, rgba(31,42,44,.96))'
        : 'rgba(31,42,44,.96)';
      bar.classList.toggle('compact', !!d.compact);
      paused = !!d.paused;
      lbl.textContent = paused ? 'Paused' : (d.label || 'Idle');
      dot.classList.toggle('paused', paused);
      pauseBtn.textContent = paused ? '▶' : '⏸';
      tEl.style.display = (d.showTimer === false) ? 'none' : '';
      if (d.showCategory && d.todayMs > 0) { tot.textContent = '· ' + fmtTot(d.todayMs) + ' today'; tot.style.display = ''; }
      else { tot.style.display = 'none'; }
      if (d.startedAt) start = d.startedAt;
      tick();
    });
    document.getElementById('open').onclick = () => window.hud.show();
    pauseBtn.onclick = () => window.hud.togglePause();
    // the pill is a drag region, so DOM hover events don't fire on it — the main
    // process detects hover by cursor position and tells us when to expand
    window.hud.onExpanded(on => bar.classList.toggle('expanded', on));
  </script>
</body>
</html>
