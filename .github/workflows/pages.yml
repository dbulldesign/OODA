name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stamp build version
        # Give every deploy a unique version (1.1.<run_number>) so the PWA's
        # in-app "new version available" prompt fires, and keep the service
        # worker cache name in lock-step. The committed source keeps its base
        # version; only the deployed artifact is stamped.
        run: |
          VER="1.1.${{ github.run_number }}"
          sed -i "s/const APP_VERSION='[^']*'/const APP_VERSION='${VER}'/" index.html
          sed -i "s/const CACHE = 'ooda-v[^']*'/const CACHE = 'ooda-v${VER}'/" sw.js
          echo "Stamped version ${VER}"
          grep -n "APP_VERSION=" index.html | head -1
          grep -n "const CACHE" sw.js | head -1
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # Serve the repository root (index.html is the entry point).
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
