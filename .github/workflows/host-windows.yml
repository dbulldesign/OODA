name: Build Windows host

# Builds the OODA desktop host into a Windows installer (.exe) with
# electron-builder. Triggers on a `host-v*` tag (e.g. host-v1.2.0) and can be
# run on demand. The installer is uploaded as a workflow artifact and always
# published to a GitHub Release (tagged host-v<version>) for a direct download.
on:
  push:
    tags:
      - 'host-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: host
        run: npm install

      - name: Build installer
        working-directory: host
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ooda-windows-installer
          path: host/dist/*.exe
          if-no-files-found: error

      - name: Publish to release
        shell: bash
        working-directory: host
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # tag pushes use their own tag; manual runs derive host-v<version>
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            TAG="host-v$(node -p "require('./package.json').version")"
          fi
          echo "Publishing release $TAG"
          gh release create "$TAG" dist/*.exe \
            --title "OODA host $TAG" \
            --notes "OODA Windows desktop host. Download the .exe below, run it, and (at the SmartScreen prompt) choose More info -> Run anyway." \
          || gh release upload "$TAG" dist/*.exe --clobber
