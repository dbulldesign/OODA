name: Build Windows host

# Builds the OODA desktop host into a Windows installer (.exe) with
# electron-builder. Triggers on a `host-v*` tag (e.g. host-v1.2.0) and can be
# run on demand. The installer is uploaded as a workflow artifact and, on a
# tag, attached to a GitHub Release.
on:
  push:
    tags:
      - 'host-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: host
        run: npm install

      - name: Build installer
        working-directory: host
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ooda-windows-installer
          path: host/dist/*.exe
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        working-directory: host
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.exe \
            --title "$GITHUB_REF_NAME" \
            --notes "OODA Windows desktop host" \
          || gh release upload "$GITHUB_REF_NAME" dist/*.exe --clobber
